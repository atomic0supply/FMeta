<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10. Componentes UI - ForMeta Guía de Estilo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>:root {
            --font-mono: 'DM Mono', 'Courier New', Courier, monospace;
            --font-serif: 'Cormorant Garamond', Garamond, Georgia, serif;
            --color-ink: #2C2C28;
            --color-terra: #B8896A;
            --color-sand: #F4F0E8;
            --color-sea: #7A9AAA;
            --color-stone: #E2DDD4;
            --color-sage: #8FA892;
            --color-white: #FFFFFF;
            --color-offblack: #1A1A18;
            --color-muted: #7A7870;
            --color-alert: #d05a5a;
            --color-bg: var(--color-sand);
            --color-text: var(--color-ink);
            --color-text-secondary: var(--color-muted);
            --color-border-secondary: rgba(44, 44, 40, 0.1);
            --spacing-xs: 0.5rem;
            --spacing-sm: 1.5rem;
            --spacing-md: 3rem;
            --spacing-lg: 6rem;
            --spacing-xl: 10rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--color-sand); color: var(--color-text); font-family: var(--font-serif); font-weight: 300; font-size: 1.15rem; line-height: 1.8; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: var(--spacing-md) var(--spacing-sm); flex: 1; }
        h1 { font-family: var(--font-serif); font-size: 3.5rem; font-weight: 300; margin-bottom: var(--spacing-xs); color: var(--color-ink); }
        h2 { font-family: var(--font-serif); font-size: 2.5rem; font-weight: 300; margin-bottom: var(--spacing-sm); padding-bottom: 1rem; border-bottom: 1px solid var(--color-border-secondary); }
        h3 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem; color: var(--color-ink); }
        p { color: var(--color-text-secondary); max-width: 650px; margin-bottom: var(--spacing-sm); }
        .intro { margin-bottom: var(--spacing-xl); }
        .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-text-secondary); margin-top: 1rem; margin-bottom: 0.5rem; }
        section { margin-bottom: var(--spacing-xl); }
        footer { text-align: center; margin-top: var(--spacing-xl); padding: var(--spacing-md) 0; border-top: 1px solid var(--color-border-secondary); }
</style>
</head>
<body>
<div class="container">
    <div class="intro">
        <div class="lbl">Sección 10</div>
        <h1>Componentes UI</h1>
    </div>
    
    <section>
        <p style="opacity: 0.6; font-style: italic;">Esta sección (Botones, inputs y UI) se desarrollará en la siguiente iteración de la guía de estilo.</p>
    </section>
  
</div>
<footer>
    <svg width="24" height="30" viewBox="0 0 160 200" style="opacity: 0.8; margin: 0 auto;">
         <path d="M80 12 C80 12 104 52 116 88 C126 118 122 152 102 168 C92 176 80 178 80 178 C80 178 68 176 58 168 C38 152 34 118 44 88 C56 52 80 12 80 12 Z" fill="none" stroke="var(--color-terra)" stroke-width="4"/>
         <circle cx="80" cy="130" r="6" fill="var(--color-terra)"/>
    </svg>
</footer>
</body>
</html>
